services:
  - type: web
    name: court-vision-api
    runtime: python
    rootDir: quiz_web_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: court-vision-db
          property: connectionString

  - type: web
    name: court-vision-web
    runtime: static
    rootDir: quiz_web_frontend
    buildCommand: printf 'window.COURT_VISION_API_BASE = "%s";\n' "$COURT_VISION_API_BASE" > config.js
    staticPublishPath: .
    plan: free
    envVars:
      - key: COURT_VISION_API_BASE
        sync: false

databases:
  - name: court-vision-db
    plan: free
